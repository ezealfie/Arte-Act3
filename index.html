<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <main>
        <header>
            <h1>Bienvenido a la tienda de heladeras</h1>
        </header>
        <section>
            <h2>Compra de heladeras</h2>
            <div>
<img src="img/azul.webp" alt="Heladera azul">
                <form method="post" action="">

                    Nombre completo: <input type="text" name="nombrecompleto" required> <br>
                    Correo electronico: <input type="email" name="correoelectronico" required> <br>
                    Telefono: <input type="tel" name="telefono" required> <br>
Elija el color del producto: <br>
<input type="radio" name="color" value="rojo" required> Rojo <br>
<input type="radio" name="color" value="azul" required> Azul <br>
<input type="radio" name="color" value="verde" required> Verde <br>
Seleccione el metodo de pago: <br>
<select name="metodopago" required>
    <option value="tarjeta">Tarjeta de credito <br>
    <option value="efectivo">Efectivo <br>
    <option value="transferencia">Mercado pago <br>
</select>
<br>
<input type="submit" value="Enviar">
                </form>
            </div>

        </section>
    </main>
<footer>
<a href="atencioncliente.html">Atención al cliente</a>
</footer>
</body>

</html>
